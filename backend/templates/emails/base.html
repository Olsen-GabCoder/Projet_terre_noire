<!DOCTYPE html>
<html lang="fr" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block title %}Frollot{% endblock %}</title>
  <!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.6; color: #333333; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f5f5f5;">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; max-width: 600px; width: 100%;">
          <!-- HEADER -->
          <tr>
            <td align="center" style="padding: 24px 30px 16px; border-bottom: 2px solid #1e3a5f;">
              {% if logo_base64 %}<img src="{{ logo_base64 }}" alt="Frollot" style="max-height: 40px; margin-bottom: 8px; display: block;" />{% elif logo_url %}<img src="{{ logo_url }}" alt="Frollot" style="max-height: 40px; margin-bottom: 8px; display: block;" />{% endif %}
              <span style="font-size: 20px; font-weight: bold; color: #1e3a5f; font-family: Arial, Helvetica, sans-serif;">Frollot</span>
            </td>
          </tr>
          <!-- CONTENT -->
          <tr>
            <td style="padding: 24px 30px; color: #333333; font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding: 16px 30px; border-top: 1px solid #eeeeee; font-size: 12px; color: #999999; font-family: Arial, Helvetica, sans-serif;">
              Frollot &mdash; Port-Gentil, Gabon<br>
              contact@frollot.com
              {% if unsubscribe_url %}<br><a href="{{ unsubscribe_url }}" style="color: #999999; text-decoration: underline;">Se désinscrire</a>{% endif %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
