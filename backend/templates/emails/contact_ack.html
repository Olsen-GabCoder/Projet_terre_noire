{% extends "emails/base.html" %}
{% block content %}
<p style="margin: 0 0 12px; color: #333333; font-size: 14px;">Bonjour <strong>{{ name }}</strong>,</p>
<p style="margin: 0 0 12px; color: #333333; font-size: 14px;">Nous avons bien recu votre message concernant &laquo; {{ subject }} &raquo;.</p>
<p style="margin: 0 0 20px; color: #333333; font-size: 13px;">Notre equipe vous repondra sous 24 heures.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin: 0 auto 20px;">
  <tr><td align="center" style="background-color: #1e3a5f; border-radius: 6px;">
    <a href="{{ frontend_url }}" target="_blank" style="display: inline-block; padding: 12px 28px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 14px;">Decouvrir le catalogue</a>
  </td></tr>
</table>
<p style="margin: 0; color: #333333;">Cordialement,<br>L'equipe Frollot</p>
{% endblock %}
