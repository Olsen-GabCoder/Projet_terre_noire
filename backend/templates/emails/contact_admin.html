{% extends "emails/base.html" %}
{% block content %}
<p><strong>Nouveau message depuis le formulaire de contact</strong></p>
<table>
  <tr><th>Nom</th><td>{{ name }}</td></tr>
  <tr><th>Email</th><td>{{ email }}</td></tr>
  <tr><th>Sujet</th><td>{{ subject }}</td></tr>
</table>
<h3>Message</h3>
<p>{{ message|linebreaks }}</p>
{% endblock %}
