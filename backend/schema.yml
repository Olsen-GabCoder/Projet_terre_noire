        - update: PUT/PATCH /api/authors/{id}/ - Modifier (admin)
        - destroy: DELETE /api/authors/{id}/ - Supprimer (admin)
      tags:
      - authors
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthorRequest'
        required: true
      security:
      - jwtAuth: []
