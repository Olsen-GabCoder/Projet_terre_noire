        Vue pour récupérer et mettre à jour le profil de l'utilisateur connecté.
        Seul l'utilisateur authentifié peut accéder à son propre profil.
      tags:
      - users
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
  /api/users/me/change-password/:
    put:
      operationId: users_me_change_password_update
      description: |-
        Vue pour changer le mot de passe de l'utilisateur connecté.
        Nécessite l'ancien mot de passe pour des raisons de sécurité.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: users_me_change_password_partial_update
      description: |-
        Vue pour changer le mot de passe de l'utilisateur connecté.
        Nécessite l'ancien mot de passe pour des raisons de sécurité.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChangeRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/users/register/:
    post:
      operationId: users_register_create
      description: |-
        Vue pour l'inscription d'un nouvel utilisateur.
        Accessible à tous (pas besoin d'être authentifié).
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/users/reset-password/:
    post:
      operationId: users_reset_password_create
      description: |-
        Réinitialisation du mot de passe avec token.
        POST /api/users/reset-password/ avec { "uid": "...", "token": "...", "new_password": "..." }
      tags:
      - users
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/wishlist/:
    get:
      operationId: wishlist_retrieve
      description: Liste des livres dans la liste d'envie de l'utilisateur connecté.
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/wishlist/{book_id}/:
    post:
      operationId: wishlist_create
      description: Ajouter ou retirer un livre de la liste d'envie.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: wishlist_destroy
      description: Ajouter ou retirer un livre de la liste d'envie.
      parameters:
      - in: path
        name: book_id
        schema:
          type: integer
        required: true
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/wishlist/add/:
    post:
      operationId: wishlist_add_create
      description: Ajouter un livre à la liste d'envie (sans retirer si déjà présent).
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/wishlist/toggle/:
    post:
      operationId: wishlist_toggle_create
      description: Ajouter ou retirer un livre de la liste d'envie.
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: wishlist_toggle_destroy
      description: Ajouter ou retirer un livre de la liste d'envie.
      tags:
      - wishlist
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
