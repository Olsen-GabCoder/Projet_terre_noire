      operationId: authors_list
      description: |-
        ViewSet pour la gestion des auteurs

        Liste des actions:
        - list: GET /api/authors/ - Liste tous les auteurs
        - retrieve: GET /api/authors/{id}/ - Détail d'un auteur avec ses livres
        - create: POST /api/authors/ - Créer un auteur (admin)
        - update: PUT/PATCH /api/authors/{id}/ - Modifier (admin)
        - destroy: DELETE /api/authors/{id}/ - Supprimer (admin)
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - authors
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuthorList'
          description: ''
    post:
      operationId: authors_create
      description: |-
        ViewSet pour la gestion des auteurs

        Liste des actions:
        - list: GET /api/authors/ - Liste tous les auteurs
        - retrieve: GET /api/authors/{id}/ - Détail d'un auteur avec ses livres
