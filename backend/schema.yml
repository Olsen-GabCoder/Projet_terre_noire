  /api/books/:
    get:
      operationId: books_list
      description: |-
        ViewSet pour la gestion complète des livres

        Liste des actions disponibles:
        - list: GET /api/books/ - Liste paginée des livres
        - retrieve: GET /api/books/{id}/ - Détail d'un livre
        - create: POST /api/books/ - Créer un livre (admin)
        - update: PUT /api/books/{id}/ - Modifier un livre (admin)
        - partial_update: PATCH /api/books/{id}/ - Modifier partiellement (admin)
        - destroy: DELETE /api/books/{id}/ - Supprimer un livre (admin)

        Filtres disponibles:
        - ?category=1 - Filtrer par catégorie
        - ?author=2 - Filtrer par auteur
        - ?book_format=EBOOK - Filtrer par format (renommé pour éviter conflit DRF)
        - ?available=true - Filtrer par disponibilité
        - ?search=victor - Rechercher dans titre/description/auteur
        - ?ordering=-created_at - Trier par date (descendant)
      parameters:
      - in: query
        name: author
        schema:
          type: integer
      - in: query
        name: available
        schema:
          type: boolean
      - in: query
        name: book_format
        schema:
          type: string
          enum:
          - EBOOK
          - PAPIER
        description: |-
          Format du livre

          * `EBOOK` - Ebook
          * `PAPIER` - Papier
      - in: query
        name: category
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: price__gte
        schema:
          type: number
      - in: query
        name: price__lte
        schema:
          type: number
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - books
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookListList'
          description: ''
    post:
      operationId: books_create
      description: |-
        ViewSet pour la gestion complète des livres

        Liste des actions disponibles:
        - list: GET /api/books/ - Liste paginée des livres
        - retrieve: GET /api/books/{id}/ - Détail d'un livre
        - create: POST /api/books/ - Créer un livre (admin)
        - update: PUT /api/books/{id}/ - Modifier un livre (admin)
        - partial_update: PATCH /api/books/{id}/ - Modifier partiellement (admin)
        - destroy: DELETE /api/books/{id}/ - Supprimer un livre (admin)

        Filtres disponibles:
        - ?category=1 - Filtrer par catégorie
        - ?author=2 - Filtrer par auteur
        - ?book_format=EBOOK - Filtrer par format (renommé pour éviter conflit DRF)
        - ?available=true - Filtrer par disponibilité
        - ?search=victor - Rechercher dans titre/description/auteur
        - ?ordering=-created_at - Trier par date (descendant)
