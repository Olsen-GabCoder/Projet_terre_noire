<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none" opacity="0.12">
  <!-- Stack of books -->
  <g transform="translate(100, 80)">
    <rect x="0" y="120" width="140" height="180" rx="6" fill="#6366f1" transform="rotate(-8)"/>
    <rect x="30" y="100" width="130" height="180" rx="6" fill="#8b5cf6" transform="rotate(-3)"/>
    <rect x="55" y="90" width="120" height="180" rx="6" fill="#a78bfa" transform="rotate(2)"/>
  </g>
  <!-- Open book center -->
  <g transform="translate(320, 100)">
    <path d="M80 20 C80 20, 0 30, 0 50 L0 220 C0 220, 80 210, 80 200 Z" fill="#6366f1"/>
    <path d="M80 20 C80 20, 160 30, 160 50 L160 220 C160 220, 80 210, 80 200 Z" fill="#8b5cf6"/>
    <line x1="20" y1="70" x2="65" y2="65" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="95" x2="65" y2="90" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="120" x2="60" y2="115" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="95" y1="65" x2="140" y2="70" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="95" y1="90" x2="140" y2="95" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="95" y1="115" x2="135" y2="120" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Floating pages -->
  <g transform="translate(580, 60)">
    <rect x="0" y="40" width="100" height="140" rx="4" fill="#a78bfa" transform="rotate(12)"/>
    <rect x="20" y="20" width="100" height="140" rx="4" fill="#6366f1" transform="rotate(5)"/>
    <rect x="35" y="5" width="100" height="140" rx="4" fill="#8b5cf6" transform="rotate(-2)"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="280" cy="350" r="4" fill="#6366f1" opacity="0.5"/>
  <circle cx="520" cy="340" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="160" cy="60" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="650" cy="50" r="4" fill="#6366f1" opacity="0.3"/>
  <circle cx="400" cy="380" r="3" fill="#8b5cf6" opacity="0.3"/>
</svg>
