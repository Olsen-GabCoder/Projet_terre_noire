name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        run: npx vitest run

  backend-test:
    name: Backend — Python checks & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: frollot_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ci-test-key-not-for-production
      DEBUG: "False"
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: frollot_test
      DB_USER: root
      DB_PASSWORD: testpass
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      ALLOWED_HOSTS: localhost,testserver
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt ruff

      - name: Lint Python (ruff)
        run: ruff check --select E,F,W --ignore E501 .

      - name: Syntax check
        run: python -m py_compile config/settings.py && python -m py_compile config/urls.py

      - name: Django check
        run: python manage.py check --deploy 2>&1

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: python manage.py test apps/ --verbosity=2

  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [frontend-lint-test, backend-test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t frollot-backend ./backend

      - name: Build frontend image
        run: docker build -t frollot-frontend ./frontend

      - name: Verify images
        run: |
          docker images | grep frollot
